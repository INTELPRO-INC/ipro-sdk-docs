# IPRO SDK Documentation Site
# GitHub Pages Configuration

title: IPRO SDK
description: A Comprehensive Software Development Kit for IPRO Hardware Platforms
baseurl: "/ipro-sdk-docs" # Your GitHub Pages repository name
url: "https://intelpro-inc.github.io" # Your GitHub Pages URL

# Theme settings
remote_theme: pages-themes/cayman@v0.2.0

# Build settings
markdown: kramdown
highlighter: rouge

# Kramdown settings
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: 'highlight'

# Collections
collections:
  docs:
    output: true
    permalink: /:collection/:name

# Defaults
defaults:
  - scope:
      path: ""
      type: "docs"
    values:
      layout: "default"
  - scope:
      path: "en"
    values:
      lang: "en"
  - scope:
      path: ""
    values:
      lang: "zh-TW"

# Navigation (Chinese)
nav:
  - title: 首頁
    url: /
  - title: 快速開始
    url: /getting-started
  - title: 系統架構
    url: /architecture
  - title: BLE 開發
    url: /ble-development
  - title: 音訊與多媒體
    url: /audio-multimedia
  - title: 工具與除錯
    url: /tools-debugging
  - title: 應用範例
    url: /applications
  - title: API 參考
    url: /api-reference
  - title: FAQ
    url: /faq
  - title: 更新日誌
    url: /changelog

# Navigation (English)
nav_en:
  - title: Home
    url: /en/
  - title: Getting Started
    url: /en/getting-started
  - title: Architecture
    url: /en/architecture
  - title: BLE Development
    url: /en/ble-development
  - title: Audio & Multimedia
    url: /en/audio-multimedia
  - title: Tools & Debugging
    url: /en/tools-debugging
  - title: Applications
    url: /en/applications
  - title: API Reference
    url: /en/api-reference
  - title: FAQ
    url: /en/faq
  - title: Changelog
    url: /en/changelog

# Languages
languages:
  zh-TW:
    name: 繁體中文
    flag: 🇹🇼
  en:
    name: English
    flag: 🇺🇸

# Note: SDK source code is hosted on internal GitLab
# This site is documentation only, hosted on GitHub Pages

# Google Analytics (optional)
# google_analytics: UA-XXXXXXXX-X

# Exclude from processing
release_notice: "此為 Release SDK 發行版本 (v1.0.1)。IPRO7 不支援 WiFi。部分進階功能（Matter、Thread、AI/NPU）及開發工具未包含在此版本中。"

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
